services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000" # Adjust to match your React Router serving port if different
    depends_on:
      - backend
    environment:
      # You can pass your backend's internal Docker URL here so the frontend can talk to it
      - BACKEND_URL=http://localhost:8001
      - VITE_BACKEND_URL=http://localhost:8001 # This will be used in your React app to make API calls

  backend:
    container_name: dsa-search-engine-backend
    build:
      context: ./backend # Assumes you have a backend folder with its own Dockerfile
      dockerfile: Dockerfile
    ports:
      - "8001:8001" # Adjust to match your backend server port
    environment:
      - NODE_ENV=production
      - PORT=8001
      - FRONTEND_URL=http://localhost:3000
      # Variables defined here will OVERRIDE the ones in your .env file
      # Example: DB_HOST=postgres_db